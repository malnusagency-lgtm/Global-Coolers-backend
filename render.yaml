services:
  - type: web
    name: global-coolers-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_VERSION
        value: 18.0.0
      - key: DATABASE_URL
        sync: false # User must set this manually in Render dashboard
